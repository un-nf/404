[listener]
bind_address = "127.0.0.1"
bind_port = 4040
proxy_protocol = "tls"

[tls]
ca_cert_path = "certs/static-ca.crt"
ca_key_path = "certs/static-ca.key"
cache_dir = "certs/cache"

	[tls.keystore]
	# file = write/read key at ca_key_path (default)
	mode = "file"
	# service/account used for OS keychains (ignored for file mode)
	service = "404.static_proxy"
	account = "ca_key"
	# fallback_path can write a copy alongside keychain storage (leave unset to avoid disk copy)
	# fallback_path = "certs/static-ca.key"

[pipeline]
profiles_path = "../profiles"
default_profile = "firefox-windows"
js_debug = false
alt_svc_strategy = "normalize"

[http3]
enabled = false
bind_address = "127.0.0.1"
bind_port = 8081

[telemetry]
mode = "stdout"