name: Build STATIC Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x86_64
            runs_on: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: static_proxy.exe
            asset_name: static_proxy-windows-x86_64.exe
          - name: linux-x86_64
            runs_on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: static_proxy
            asset_name: static_proxy-linux-x86_64
          - name: macos-x86_64
            runs_on: macos-15-intel
            target: x86_64-apple-darwin
            binary_name: static_proxy
            asset_name: static_proxy-macos-x86_64
          - name: macos-aarch64
            runs_on: macos-14
            target: aarch64-apple-darwin
            binary_name: static_proxy
            asset_name: static_proxy-macos-aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/STATIC_proxy/build/package-lock.json

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config clang cmake ninja-build perl make g++

      - name: Install Windows build dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install strawberryperl ninja llvm -y
          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja perl

      - name: Install STATIC JS build dependencies
        run: npm ci --prefix src/STATIC_proxy/build

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src/STATIC_proxy -> target

      - name: Build STATIC proxy
        run: cargo build --release --locked --manifest-path src/STATIC_proxy/Cargo.toml --bin static_proxy --target ${{ matrix.target }}

      - name: Stage asset
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "src/STATIC_proxy/target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.asset_name }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset_name }}

  publish-release-manifest:
    name: Publish STATIC release manifest
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download staged STATIC binaries
        uses: actions/download-artifact@v4
        with:
          path: dist-release
          pattern: static_proxy-*
          merge-multiple: false

      - name: Build STATIC release manifest
        run: |
          node .github/scripts/build-static-release-manifest.mjs \
            --input dist-release \
            --output dist-release/static_proxy-release-manifest.json \
            --version "${GITHUB_REF_NAME}"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.8.1

      - name: Sign STATIC release manifest
        run: |
          cosign sign-blob --yes \
            --output-signature dist-release/static_proxy-release-manifest.json.sig \
            --output-certificate dist-release/static_proxy-release-manifest.json.pem \
            dist-release/static_proxy-release-manifest.json

      - name: Normalize STATIC manifest certificate PEM
        run: |
          node <<'EOF'
          const fs = require('node:fs');

          const certificatePath = 'dist-release/static_proxy-release-manifest.json.pem';
          const raw = fs.readFileSync(certificatePath, 'utf8').trim();

          if (raw.includes('-----BEGIN CERTIFICATE-----')) {
            fs.writeFileSync(certificatePath, `${raw}\n`, 'utf8');
            process.exit(0);
          }

          const decoded = Buffer.from(raw, 'base64').toString('utf8').trim();
          if (!decoded.includes('-----BEGIN CERTIFICATE-----')) {
            throw new Error('cosign certificate output was neither raw PEM nor base64-encoded PEM');
          }

          fs.writeFileSync(certificatePath, `${decoded}\n`, 'utf8');
          EOF

      - name: Upload manifest workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: static_proxy-release-manifest
          path: |
            dist-release/static_proxy-release-manifest.json
            dist-release/static_proxy-release-manifest.json.sig
            dist-release/static_proxy-release-manifest.json.pem

      - name: Publish manifest release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-release/static_proxy-release-manifest.json
            dist-release/static_proxy-release-manifest.json.sig
            dist-release/static_proxy-release-manifest.json.pem

  package-operator-bundles:
    name: Package operator bundles
    runs-on: ubuntu-latest
    needs:
      - build
      - publish-release-manifest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download staged STATIC binaries
        uses: actions/download-artifact@v4
        with:
          path: dist-release
          pattern: static_proxy-*
          merge-multiple: false

      - name: Download STATIC release manifest artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-release/manifest
          name: static_proxy-release-manifest

      - name: Build macOS operator bundles
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist-bundles

          make_bundle() {
            local source_file="$1"
            local bundle_name="$2"
            local bundle_dir="dist-bundles/${bundle_name%.zip}"

            rm -rf "$bundle_dir"
            mkdir -p "$bundle_dir/404-runtime/profiles"
            mkdir -p "$bundle_dir/404-runtime/config"

            cp "$source_file" "$bundle_dir/404-runtime/static_proxy"
            chmod +x "$bundle_dir/404-runtime/static_proxy"

            cp dist-release/manifest/static_proxy-release-manifest.json "$bundle_dir/404-runtime/"
            cp dist-release/manifest/static_proxy-release-manifest.json.sig "$bundle_dir/404-runtime/"
            cp dist-release/manifest/static_proxy-release-manifest.json.pem "$bundle_dir/404-runtime/"

            cp src/STATIC_proxy/profiles/manifest.json "$bundle_dir/404-runtime/profiles/"
            cp src/STATIC_proxy/profiles/chrome-windows.json "$bundle_dir/404-runtime/profiles/"
            cp src/STATIC_proxy/profiles/edge-windows.json "$bundle_dir/404-runtime/profiles/"
            cp src/STATIC_proxy/profiles/firefox-windows.json "$bundle_dir/404-runtime/profiles/"

            cat > "$bundle_dir/404-runtime/config/static.example.toml" <<'EOF'
            [listener]
            bind_address = "127.0.0.1"
            bind_port = 4040
            proxy_protocol = "tls"

            [tls]
            keystore = { mode = "keychain", service = "404.static_proxy", account = "ca_key" }

            [pipeline]
            profiles_path = "../profiles"
            default_profile = "firefox-windows"
            js_debug = false
            alt_svc_strategy = "normalize"
            body_limits = { max_request_body_bytes = 16777216, max_response_body_bytes = 33554432, max_decompressed_html_bytes = 16777216 }

            [http3]
            enabled = false
            bind_address = "127.0.0.1"
            bind_port = 4041

            [telemetry]
            mode = "stdout"
            EOF

            (
              cd "$bundle_dir"
              zip -r "../$bundle_name" 404-runtime
            )
          }

          make_bundle \
            dist-release/static_proxy-macos-aarch64/static_proxy-macos-aarch64 \
            404-macos-aarch64.zip

          make_bundle \
            dist-release/static_proxy-macos-x86_64/static_proxy-macos-x86_64 \
            404-macos-x64.zip

      - name: Upload bundle workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: static-operator-bundles
          path: |
            dist-bundles/404-macos-aarch64.zip
            dist-bundles/404-macos-x64.zip

      - name: Publish bundle release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-bundles/404-macos-aarch64.zip
            dist-bundles/404-macos-x64.zip
